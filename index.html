<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Brief — Daily Market Intelligence | April 30, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f9f6f0;
    --cream-dark: #f0ebe1;
    --cream-border: #e2d9cc;
    --ink: #1a1714;
    --ink-mid: #3d3530;
    --ink-light: #6b5f55;
    --ink-faint: #9c8f84;
    --red-alert: #1c1410;
    --red-accent: #c0392b;
    --green-accent: #1a6b3a;
    --green-light: #eaf4ed;
    --green-border: #a8d5b5;
    --gold: #b07d2e;
    --gold-light: #f5ead4;
    --blue-accent: #1b3f6e;
    --blue-light: #e8eef6;
    --serif: 'Playfair Display', Georgia, serif;
    --body: 'Source Serif 4', Georgia, serif;
    --mono: 'DM Mono', 'Courier New', monospace;
  }

  html { font-size: 16px; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: var(--body);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .page-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ── MASTHEAD ── */
  .masthead {
    text-align: center;
    padding: 44px 0 20px;
    border-bottom: 2px solid var(--ink);
  }

  .masthead-eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
  }

  .masthead-title {
    font-family: var(--serif);
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.05;
    color: var(--ink);
  }

  .masthead-subtitle {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-light);
    margin-top: 6px;
  }

  .masthead-rule {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 14px auto 0;
  }

  /* ── ALERT STRIP ── */
  .alert-strip {
    background: var(--red-alert);
    color: #e8ddd4;
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    padding: 9px 16px;
    margin-top: 0;
  }

  .alert-strip span.hi { color: #f0c070; font-weight: 500; }

  /* ── DATELINE ── */
  .dateline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--cream-border);
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    margin-bottom: 0;
  }

  /* ── TICKER ROW ── */
  .ticker-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border: 1px solid var(--cream-border);
    border-top: none;
    margin-bottom: 28px;
    background: var(--cream-dark);
  }

  .ticker-cell {
    padding: 11px 10px;
    border-right: 1px solid var(--cream-border);
    text-align: center;
  }

  .ticker-cell:last-child { border-right: none; }

  .ticker-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 3px;
  }

  .ticker-value {
    font-family: var(--mono);
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
  }

  .ticker-change {
    font-family: var(--mono);
    font-size: 0.68rem;
    margin-top: 2px;
  }

  .up { color: var(--green-accent); }
  .dn { color: var(--red-accent); }
  .fl { color: var(--ink-faint); }

  /* ── TABLE OF CONTENTS ── */
  .toc-block {
    border: 1px solid var(--cream-border);
    background: var(--cream-dark);
    padding: 20px 24px;
    margin-bottom: 32px;
  }

  .toc-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 12px;
  }

  .toc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 24px;
  }

  .toc-item {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--ink-mid);
    text-decoration: none;
    padding: 3px 0;
    border-bottom: 1px dotted var(--cream-border);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .toc-item:hover { color: var(--gold); }

  .toc-num {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--ink-faint);
    flex-shrink: 0;
  }

  /* ── SMART IN 30 BLOCK ── */
  .smart30 {
    background: var(--red-alert);
    color: #ede5da;
    padding: 28px 32px;
    margin-bottom: 36px;
    position: relative;
  }

  .smart30-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #b5a090;
    margin-bottom: 12px;
  }

  .smart30-headline {
    font-family: var(--serif);
    font-size: 1.45rem;
    font-weight: 700;
    font-style: italic;
    color: #f5ede0;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .smart30 ul {
    list-style: none;
    padding: 0;
  }

  .smart30 ul li {
    font-family: var(--body);
    font-size: 0.88rem;
    color: #d9cfc4;
    padding: 5px 0 5px 18px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    line-height: 1.5;
  }

  .smart30 ul li:last-child { border-bottom: none; }

  .smart30 ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--gold);
    font-size: 0.8rem;
  }

  .smart30 ul li strong { color: #f0e4d0; }

  /* ── SECTION HEADERS ── */
  .section-header {
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--cream-border);
  }

  .section-num {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 4px;
  }

  .section-title {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.15;
  }

  .section-block {
    margin-bottom: 40px;
  }

  /* ── EDITORIAL BODY ── */
  .editorial p {
    font-family: var(--body);
    font-size: 0.95rem;
    color: var(--ink-mid);
    line-height: 1.72;
    margin-bottom: 14px;
  }

  .editorial p strong { color: var(--ink); font-weight: 600; }

  .editorial .lede {
    font-size: 1.05rem;
    color: var(--ink);
    font-weight: 300;
    font-style: italic;
    border-left: 3px solid var(--gold);
    padding-left: 16px;
    margin-bottom: 18px;
  }

  /* ── BULLET LISTS ── */
  .bullet-list {
    list-style: none;
    padding: 0;
    margin-bottom: 14px;
  }

  .bullet-list li {
    font-family: var(--body);
    font-size: 0.92rem;
    color: var(--ink-mid);
    padding: 6px 0 6px 20px;
    position: relative;
    border-bottom: 1px solid var(--cream-border);
    line-height: 1.55;
  }

  .bullet-list li:last-child { border-bottom: none; }

  .bullet-list li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--gold);
    font-size: 0.75rem;
    top: 8px;
  }

  .bullet-list li strong { color: var(--ink); }

  /* ── CHAIN REACTION ── */
  .chain {
    background: var(--blue-light);
    border: 1px solid #c5d5e8;
    padding: 20px 24px;
    margin-bottom: 14px;
  }

  .chain-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(27,63,110,0.1);
  }

  .chain-step:last-child { border-bottom: none; padding-bottom: 0; }
  .chain-step:first-child { padding-top: 0; }

  .chain-icon {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--blue-accent);
    background: #d0def0;
    padding: 3px 8px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
    font-weight: 500;
  }

  .chain-text {
    font-family: var(--body);
    font-size: 0.9rem;
    color: var(--ink-mid);
    line-height: 1.55;
  }

  .chain-text strong { color: var(--blue-accent); }

  /* ── CARD GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }

  .card-grid-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }

  .card {
    background: var(--cream-dark);
    border: 1px solid var(--cream-border);
    padding: 16px;
  }

  .card-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
    display: block;
  }

  .card-headline {
    font-family: var(--serif);
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 7px;
    line-height: 1.25;
  }

  .card p {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--ink-mid);
    line-height: 1.55;
  }

  /* ── SECTOR TABLE ── */
  .sector-card {
    border: 1px solid var(--cream-border);
    overflow: hidden;
    margin-bottom: 14px;
  }

  .sector-row {
    display: grid;
    grid-template-columns: 1.8fr 0.8fr 2.5fr;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--cream-border);
    gap: 12px;
  }

  .sector-row:last-child { border-bottom: none; }

  .sector-row:nth-child(even) { background: var(--cream-dark); }

  .sector-name {
    font-family: var(--body);
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--ink);
  }

  .sector-move {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    text-align: center;
  }

  .sector-note {
    font-family: var(--body);
    font-size: 0.8rem;
    color: var(--ink-light);
    font-style: italic;
  }

  /* ── CAREER CARDS ── */
  .career-card {
    background: var(--cream-dark);
    border: 1px solid var(--cream-border);
    border-top: 3px solid var(--gold);
    padding: 18px 18px 16px;
  }

  .career-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
  }

  .career-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .career-card p {
    font-family: var(--body);
    font-size: 0.83rem;
    color: var(--ink-mid);
    line-height: 1.58;
  }

  /* ── INTERVIEW BLOCK ── */
  .interview-block {
    background: var(--gold-light);
    border: 1px solid #d4b870;
    border-left: 4px solid var(--gold);
    padding: 20px 24px;
    margin-bottom: 14px;
  }

  .interview-block ul {
    list-style: none;
    padding: 0;
    margin-top: 10px;
  }

  .interview-block ul li {
    font-family: var(--body);
    font-size: 0.9rem;
    color: var(--ink-mid);
    padding: 7px 0 7px 20px;
    position: relative;
    border-bottom: 1px solid rgba(176, 125, 46, 0.2);
    line-height: 1.5;
  }

  .interview-block ul li:last-child { border-bottom: none; }

  .interview-block ul li::before {
    content: 'Q';
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 500;
    position: absolute;
    left: 0;
    top: 9px;
    color: var(--gold);
    background: #d4b870;
    width: 14px;
    height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 2px 0 0 2px;
  }

  /* ── TERM OF THE DAY ── */
  .term-block {
    border: 1px solid var(--cream-border);
    padding: 22px 24px;
    background: var(--cream-dark);
    margin-bottom: 14px;
    position: relative;
  }

  .term-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }

  .term-word {
    font-family: var(--serif);
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .term-pronunciation {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--ink-faint);
    margin-bottom: 12px;
    font-style: italic;
  }

  .term-block p {
    font-family: var(--body);
    font-size: 0.9rem;
    color: var(--ink-mid);
    line-height: 1.65;
  }

  .term-block p strong { color: var(--ink); }

  .term-used {
    margin-top: 12px;
    font-style: italic;
    border-top: 1px solid var(--cream-border);
    padding-top: 12px;
  }

  /* ── SAY THIS TODAY ── */
  .say-this {
    background: var(--green-light);
    border: 1px solid var(--green-border);
    border-left: 4px solid var(--green-accent);
    padding: 20px 24px;
    margin-bottom: 40px;
  }

  .say-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green-accent);
    margin-bottom: 10px;
  }

  .say-quote {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-style: italic;
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 10px;
  }

  .say-explain {
    font-family: var(--body);
    font-size: 0.83rem;
    color: var(--ink-mid);
    line-height: 1.55;
  }

  /* ── CHANGED SINCE MORNING ── */
  .changed-block {
    background: #fff8f0;
    border: 1px solid #e8c88a;
    border-left: 4px solid #d48a20;
    padding: 18px 22px;
    margin-bottom: 40px;
  }

  .changed-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #a06010;
    margin-bottom: 10px;
  }

  .changed-block ul {
    list-style: none;
    padding: 0;
  }

  .changed-block ul li {
    font-family: var(--body);
    font-size: 0.88rem;
    color: var(--ink-mid);
    padding: 6px 0 6px 18px;
    position: relative;
    border-bottom: 1px solid #f0d8a0;
    line-height: 1.5;
  }

  .changed-block ul li:last-child { border-bottom: none; }

  .changed-block ul li::before {
    content: '↻';
    position: absolute;
    left: 0;
    color: #d48a20;
    font-size: 0.85rem;
    top: 6px;
  }

  /* ── SOURCES ── */
  .sources-block {
    border-top: 1px solid var(--cream-border);
    padding-top: 20px;
    margin-bottom: 10px;
  }

  .sources-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }

  .sources-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .source-pill {
    font-family: var(--mono);
    font-size: 0.62rem;
    background: var(--cream-dark);
    border: 1px solid var(--cream-border);
    color: var(--ink-light);
    padding: 3px 10px;
    border-radius: 2px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 20px 0 0;
    border-top: 2px solid var(--ink);
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  .footer-title {
    font-family: var(--serif);
    font-size: 0.85rem;
    color: var(--ink);
    font-weight: 700;
    margin-bottom: 4px;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 24px 0;
  }

  /* ── HIGHLIGHT PILL ── */
  .pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 9px;
    border-radius: 2px;
    margin-right: 4px;
  }

  .pill-red { background: #fdecea; color: var(--red-accent); border: 1px solid #f5c0bb; }
  .pill-green { background: var(--green-light); color: var(--green-accent); border: 1px solid var(--green-border); }
  .pill-gold { background: var(--gold-light); color: var(--gold); border: 1px solid #d4b870; }
  .pill-blue { background: var(--blue-light); color: var(--blue-accent); border: 1px solid #c5d5e8; }

  @media (max-width: 640px) {
    .masthead-title { font-size: 2rem; }
    .ticker-row { grid-template-columns: repeat(3, 1fr); }
    .ticker-cell:nth-child(4), .ticker-cell:nth-child(5) { border-top: 1px solid var(--cream-border); }
    .card-grid { grid-template-columns: 1fr; }
    .card-grid-2 { grid-template-columns: 1fr; }
    .toc-grid { grid-template-columns: 1fr; }
    .sector-row { grid-template-columns: 1fr 0.6fr; }
    .sector-note { display: none; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-eyebrow">Daily Market Intelligence</div>
    <div class="masthead-title">The Brief</div>
    <div class="masthead-subtitle">Markets · Macro · Careers · Context</div>
    <div class="masthead-rule"></div>
  </header>

  <!-- ALERT STRIP -->
  <div class="alert-strip">
    <span class="hi">⬆ MARKETS HIGHER</span> &nbsp;·&nbsp; Q1 GDP 2.0% — below 2.3% est &nbsp;·&nbsp; Core PCE 3.2% Y/Y &
