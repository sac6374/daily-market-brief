<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brief — Daily Market Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede7d9;
    --cream-mid: #f0ead8;
    --black: #0a0a0a;
    --ink: #1a1a1a;
    --ink-mid: #2d2d2d;
    --ink-light: #4a4a4a;
    --rule: #1a1a1a;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --red: #8b1a1a;
    --green: #1a4a2e;
    --green-bright: #2d7a4f;
    --blue-dark: #0d1b2a;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Playfair Display', Georgia, serif;
    --body-serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: var(--body-serif);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TICKER STRIP ── */
  .ticker-strip {
    background: var(--black);
    color: #e8e0d0;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    overflow: hidden;
    white-space: nowrap;
    padding: 7px 0;
    border-bottom: 1px solid #333;
  }
  .ticker-inner {
    display: inline-block;
    animation: ticker 55s linear infinite;
  }
  .ticker-inner span {
    margin-right: 48px;
  }
  .ticker-inner .up { color: #4ade80; }
  .ticker-inner .down { color: #f87171; }
  .ticker-inner .flat { color: #94a3b8; }
  .ticker-inner .label { color: #94a3b8; margin-right: 4px; }
  @keyframes ticker {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  /* ── MASTHEAD ── */
  .masthead {
    background: var(--black);
    padding: 0;
    border-bottom: 3px double #444;
  }
  .masthead-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 32px 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }
  .masthead-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .masthead-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #888;
    text-transform: uppercase;
  }
  .masthead-sub {
    font-family: var(--sans);
    font-size: 11px;
    color: #666;
    font-weight: 300;
    letter-spacing: 0.06em;
  }
  .masthead-center {
    text-align: center;
  }
  .masthead-title {
    font-family: var(--serif);
    font-size: 72px;
    font-weight: 900;
    color: #f5f0e8;
    letter-spacing: -0.02em;
    line-height: 0.9;
    display: block;
  }
  .masthead-title em {
    color: var(--gold-light);
    font-style: italic;
  }
  .masthead-rule {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    justify-content: center;
  }
  .masthead-rule span {
    height: 1px;
    width: 60px;
    background: #444;
    display: block;
  }
  .masthead-rule em {
    font-family: var(--mono);
    font-size: 9px;
    color: #666;
    letter-spacing: 0.12em;
    font-style: normal;
  }
  .masthead-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .masthead-edition {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    color: #888;
    text-transform: uppercase;
  }
  .masthead-price {
    font-family: var(--sans);
    font-size: 11px;
    color: #555;
    font-weight: 300;
  }

  /* ── DATELINE ROW ── */
  .dateline-row {
    background: var(--cream-dark);
    border-bottom: 2px solid var(--rule);
    border-top: 1px solid #d4cebe;
  }
  .dateline-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .dateline-left {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .dateline-date {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink);
    font-weight: 600;
    text-transform: uppercase;
  }
  .dateline-sep {
    width: 1px;
    height: 14px;
    background: #aaa;
    display: block;
  }
  .dateline-session {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink-light);
  }
  .dateline-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .dateline-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--black);
    color: #f5f0e8;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 4px 10px;
    text-transform: uppercase;
  }
  .dateline-pill.bullish { background: #1a4a2e; }
  .dateline-pill.bearish { background: #6b1a1a; }
  .dateline-pill.neutral { background: #3a3020; }
  .dateline-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }
  .dateline-dot.red { background: #f87171; }
  .dateline-dot.amber { background: #fbbf24; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── MARKET STAT GRID ── */
  .stat-band {
    background: var(--ink);
    border-bottom: 3px solid var(--gold);
  }
  .stat-grid {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
  }
  .stat-cell {
    padding: 16px 12px;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }
  .stat-cell:last-child { border-right: none; }
  .stat-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.16em;
    color: #888;
    text-transform: uppercase;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 600;
    color: #f5f0e8;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .stat-change {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .stat-change.up { color: #4ade80; }
  .stat-change.down { color: #f87171; }
  .stat-change.flat { color: #94a3b8; }
  .stat-sub {
    font-family: var(--mono);
    font-size: 8px;
    color: #666;
    letter-spacing: 0.06em;
  }

  /* ── MAIN WRAPPER ── */
  .main-wrapper {
    max-width: 1180px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--rule);
  }
  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--black);
    color: var(--cream);
    padding: 4px 10px;
    font-weight: 600;
  }
  .section-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .section-rule {
    flex: 1;
    height: 1px;
    background: #ccc;
  }

  /* ── TWO COLUMN TOC ── */
  .toc-block {
    background: var(--cream-dark);
    border: 1px solid #c8c0b0;
    border-top: 3px solid var(--black);
    padding: 28px 32px;
    margin-bottom: 44px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 40px;
  }
  .toc-header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #b0a898;
  }
  .toc-title {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .toc-date {
    font-family: var(--mono);
    font-size: 9px;
    color: #888;
    letter-spacing: 0.1em;
    margin-left: auto;
  }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px dotted #c0b8a8;
    cursor: pointer;
  }
  .toc-item:last-child { border-bottom: none; }
  .toc-num {
    font-family: var(--mono);
    font-size: 9px;
    color: #aaa;
    letter-spacing: 0.08em;
    min-width: 20px;
    font-weight: 600;
  }
  .toc-text {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink-mid);
    font-weight: 500;
    flex: 1;
    line-height: 1.4;
  }
  .toc-tag {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid;
    font-weight: 500;
  }
  .toc-tag.markets { color: #1a4a2e; border-color: #1a4a2e; }
  .toc-tag.macro { color: #5a3a1a; border-color: #8b5e1a; }
  .toc-tag.career { color: #1a1a6e; border-color: #2a2a8e; }
  .toc-tag.intel { color: #6b1a1a; border-color: #8b2a2a; }
  .toc-tag.learn { color: #2a4a5a; border-color: #3a6a7a; }

  /* ── SMART IN 30 SECONDS ── */
  .smart-block {
    background: var(--blue-dark);
    border: 1px solid #1e3a5a;
    padding: 32px 36px;
    margin-bottom: 44px;
    position: relative;
    overflow: hidden;
  }
  .smart-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--gold-light);
  }
  .smart-block::after {
    content: '"';
    position: absolute;
    right: 32px; top: 16px;
    font-family: var(--serif);
    font-size: 120px;
    color: rgba(255,255,255,0.04);
    line-height: 1;
  }
  .smart-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .smart-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-light);
    font-weight: 600;
  }
  .smart-rule { flex: 1; height: 1px; background: #1e3a5a; }
  .smart-time {
    font-family: var(--mono);
    font-size: 9px;
    color: #4a6a8a;
    letter-spacing: 0.1em;
  }
  .smart-headline {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 700;
    color: #f0ead8;
    line-height: 1.25;
    margin-bottom: 20px;
    max-width: 700px;
    letter-spacing: -0.01em;
  }
  .smart-bullets {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .smart-bullet {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .smart-bullet-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gold-light);
    font-weight: 600;
    min-width: 20px;
    padding-top: 2px;
    letter-spacing: 0.06em;
  }
  .smart-bullet-text {
    font-family: var(--sans);
    font-size: 14px;
    color: #c8d8e8;
    line-height: 1.55;
    font-weight: 300;
  }
  .smart-bullet-text strong {
    color: #e8f0f8;
    font-weight: 600;
  }

  /* ── TWO-COLUMN LAYOUT ── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 40px;
    margin-bottom: 44px;
    align-items: start;
  }
  .three-col {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 44px;
  }

  /* ── LEAD STORY ── */
  .lead-story {
    border-top: 3px solid var(--black);
    padding-top: 20px;
  }
  .story-kicker {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .story-headline {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 900;
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .story-headline em { font-style: italic; }
  .story-dek {
    font-family: var(--body-serif);
    font-size: 15px;
    color: var(--ink-light);
    font-weight: 300;
    font-style: italic;
    line-height: 1.5;
    margin-bottom: 18px;
    border-left: 3px solid #ccc;
    padding-left: 14px;
  }
  .story-body {
    font-family: var(--body-serif);
    font-size: 15px;
    color: var(--ink-mid);
    line-height: 1.75;
  }
  .story-body p { margin-bottom: 14px; }
  .story-body strong { font-weight: 600; color: var(--ink); }
  .story-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .story-divider span { flex: 1; height: 1px; background: #d0c8b8; }
  .story-divider em { font-family: var(--mono); font-size: 9px; color: #aaa; letter-spacing: 0.12em; font-style: normal; }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 24px; }

  /* ── BOXED SECTIONS ── */
  .box {
    border: 1px solid #c0b8a8;
    border-top: 3px solid var(--black);
    background: var(--cream);
  }
  .box-header {
    background: var(--black);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .box-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #e8e0d0;
    font-weight: 600;
  }
  .box-meta {
    font-family: var(--mono);
    font-size: 8px;
    color: #666;
    letter-spacing: 0.1em;
  }
  .box-body { padding: 18px; }

  /* ── NUMBER BOX ── */
  .number-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 12px 0;
    border-bottom: 1px dotted #ccc;
  }
  .number-item:last-child { border-bottom: none; padding-bottom: 0; }
  .number-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .number-val.up { color: var(--green); }
  .number-val.down { color: var(--red); }
  .number-label {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-light);
    font-weight: 500;
    line-height: 1.3;
  }
  .number-context {
    font-family: var(--sans);
    font-size: 11px;
    color: #888;
    font-weight: 300;
    line-height: 1.4;
  }

  /* ── MARKET SECTOR CARDS ── */
  .sector-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: #c0b8a8;
    border: 1px solid #c0b8a8;
    margin-bottom: 44px;
  }
  .sector-card {
    background: var(--cream);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .sector-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
  }
  .sector-card.up::after { background: var(--green-bright); }
  .sector-card.down::after { background: var(--red); }
  .sector-card.flat::after { background: #aaa; }
  .sector-ticker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--ink-light);
  }
  .sector-name {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
  }
  .sector-price {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .sector-chg {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .sector-chg.up { color: var(--green-bright); }
  .sector-chg.down { color: var(--red); }
  .sector-chg.flat { color: #888; }
  .sector-bar {
    height: 3px;
    background: #e0d8c8;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .sector-bar-fill {
    height: 100%;
    border-radius: 2px;
  }
  .sector-bar-fill.up { background: var(--green-bright); }
  .sector-bar-fill.down { background: var(--red); }
  .sector-note {
    font-family: var(--sans);
    font-size: 10px;
    color: #999;
    font-weight: 300;
  }

  /* ── FINANCE CAREER CARDS ── */
  .career-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 44px;
  }
  .career-card {
    border: 1px solid #c0b8a8;
    border-top: 3px solid var(--black);
    background: var(--cream);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .career-card-tag {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #888;
    font-weight: 600;
  }
  .career-card-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .career-card-body {
    font-family: var(--sans);
