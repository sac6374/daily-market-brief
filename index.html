<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brief — Daily Market Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE8DC;
    --cream-mid: #F0EBE0;
    --black: #0A0A0A;
    --ink: #1A1A1A;
    --charcoal: #2C2C2C;
    --mid-gray: #5A5A5A;
    --light-gray: #9A9A9A;
    --rule: #C8C0B0;
    --rule-light: #DDD8CE;
    --gold: #B8860B;
    --gold-light: #D4A017;
    --red: #C0392B;
    --green: #1A6B3A;
    --blue-dark: #1A2744;
    --ticker-bg: #0A0A0A;
    --ticker-text: #F5F0E8;
    --smart30-bg: #1A1A1A;
    --smart30-text: #F5F0E8;
  }

  html { font-size: 16px; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── TICKER STRIP ─── */
  .ticker-wrapper {
    background: var(--ticker-bg);
    color: var(--ticker-text);
    overflow: hidden;
    height: 34px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #333;
  }

  .ticker-label {
    background: var(--gold);
    color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 0 14px;
    height: 100%;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .ticker-track {
    display: flex;
    animation: ticker 55s linear infinite;
    white-space: nowrap;
    align-items: center;
    height: 100%;
  }

  .ticker-track:hover { animation-play-state: paused; }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-right: 1px solid #333;
    height: 100%;
  }

  .ticker-sym {
    color: #aaa;
    font-weight: 500;
    letter-spacing: 0.08em;
  }

  .ticker-val { color: #f5f0e8; font-weight: 600; }

  .ticker-chg.up { color: #4CAF7D; }
  .ticker-chg.down { color: #E05A5A; }
  .ticker-chg.flat { color: #aaa; }

  /* ─── MASTHEAD ─── */
  .masthead {
    border-bottom: 3px double var(--rule);
    padding: 28px 0 20px;
    text-align: center;
    background: var(--cream);
    position: relative;
  }

  .masthead-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--mid-gray);
    margin-bottom: 10px;
  }

  .masthead-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--black);
    line-height: 1;
    margin-bottom: 6px;
  }

  .masthead-rule {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 10px auto;
  }

  .masthead-sub {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid-gray);
  }

  /* ─── DATELINE ROW ─── */
  .dateline-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 40px;
    background: var(--black);
    color: var(--cream);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dateline-row .edition { color: var(--gold); }

  /* ─── MAIN CONTAINER ─── */
  .container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ─── SECTION LABELS ─── */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--mid-gray);
    border-top: 2px solid var(--ink);
    padding-top: 8px;
    margin-bottom: 4px;
    display: block;
  }

  .section-label.gold {
    color: var(--gold);
    border-top-color: var(--gold);
  }

  /* ─── MARKET STATS GRID ─── */
  .stats-band {
    background: var(--cream-dark);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 20px 40px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
  }

  .stat-cell {
    padding: 14px 16px;
    border-right: 1px solid var(--rule);
    text-align: center;
  }

  .stat-cell:last-child { border-right: none; }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--light-gray);
    display: block;
    margin-bottom: 5px;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    display: block;
    line-height: 1.1;
  }

  .stat-change {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    display: block;
    margin-top: 3px;
  }

  .stat-change.up { color: var(--green); }
  .stat-change.down { color: var(--red); }
  .stat-change.flat { color: var(--light-gray); }

  /* ─── TABLE OF CONTENTS ─── */
  .toc-section {
    padding: 32px 40px;
    border-bottom: 1px solid var(--rule);
  }

  .toc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 60px;
    margin-top: 20px;
  }

  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px dotted var(--rule);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .toc-item:hover { opacity: 0.7; }

  .toc-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 600;
    color: var(--gold);
    flex-shrink: 0;
    width: 24px;
  }

  .toc-title {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
  }

  .toc-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .toc-tag.markets { background: #1A2744; color: #fff; }
  .toc-tag.macro { background: #2C1A44; color: #fff; }
  .toc-tag.career { background: #1A3A2A; color: #fff; }
  .toc-tag.deep { background: #4A2010; color: #fff; }
  .toc-tag.intel { background: #3A3010; color: #fff; }

  /* ─── SMART IN 30 SECONDS ─── */
  .smart30 {
    background: var(--smart30-bg);
    color: var(--smart30-text);
    padding: 36px 40px;
    margin: 0;
  }

  .smart30-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 22px;
  }

  .smart30-badge {
    background: var(--gold);
    color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .smart30-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--smart30-text);
  }

  .smart30-items {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
  }

  .smart30-item {
    border-left: 2px solid var(--gold);
    padding-left: 16px;
  }

  .smart30-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .smart30-item-text {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: #d4cec5;
    line-height: 1.55;
  }

  .smart30-item-text strong {
    color: var(--smart30-text);
    font-weight: 600;
  }

  /* ─── CONTENT AREA ─── */
  .content-area {
    padding: 40px 40px;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
  }

  .three-col {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 32px;
  }

  /* ─── ARTICLE BLOCKS ─── */
  .article-block {
    margin-bottom: 40px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--rule);
  }

  .article-block:last-child { border-bottom: none; }

  .article-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 8px;
  }

  .article-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 2.5vw, 28px);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.25;
    margin-bottom: 12px;
  }

  .article-headline.large {
    font-size: clamp(26px, 3.5vw, 38px);
  }

  .article-deck {
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    color: var(--charcoal);
    line-height: 1.6;
    margin-bottom: 16px;
    border-left: 3px solid var(--gold);
    padding-left: 14px;
  }

  .article-body {
    font-family: 'Source Serif 4', serif;
    font-size: 14.5px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.75;
  }

  .article-body p { margin-bottom: 14px; }
  .article-body p:last-child { margin-bottom: 0; }

  .article-body strong { font-weight: 600; color: var(--black); }

  .byline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: var(--light-gray);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .byline-sep {
    width: 20px;
    height: 1px;
    background: var(--rule);
    display: inline-block;
  }

  /* ─── HORIZONTAL RULE ─── */
  .h-rule {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 36px 0;
  }

  .h-rule.double {
    border-top: 3px double var(--rule);
  }

  .h-rule.thick {
    border-top: 2px solid var(--ink);
    margin: 28px 0 20px;
  }

  /* ─── MARKET SECTOR CARDS ─── */
  .sector-cards-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .sector-headline {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
  }

  .sector-cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 40px;
  }

  .sector-card {
    background: var(--cream-dark);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--rule);
    padding: 16px;
    transition: border-top-color 0.2s;
  }

  .sector-card.up { border-top-color: var(--green); }
  .sector-card.down { border-top-color: var(--red); }
  .sector-card.flat { border-top-color: var(--light-gray); }

  .sector-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid-gray);
    display: block;
    margin-bottom: 8px;
  }

  .sector-val {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--ink);
    display: block;
    margin-bottom: 4px;
  }

  .sector-chg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sector-chg.up { color: var(--green); }
  .sector-chg.down { color: var(--red); }
  .sector-chg.flat { color: var(--light-gray); }

  .sector-summary {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--mid-gray);
    margin-top: 10px;
    line-height: 1.5;
    border-top: 1px dotted var(--rule);
    padding-top: 10px;
  }

  /* ─── BOXED SECTIONS ─── */
  .box {
    border: 1px solid var(--rule);
    padding: 24px 26px;
    margin-bottom: 28px;
    background: var(--cream-mid);
  }

  .box-heavy {
    border: 2px solid var(--ink);
    padding: 24px 26px;
    margin-bottom: 28px;
    background: var(--cream);
  }

  .box-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }

  /* ─── FINANCE CAREER CARDS ─── */
  .career-cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 20px;
  }

  .career-card {
    border: 1px solid var(--rule);
    border-left: 4px solid var(--gold);
    padding: 18px 20px;
    background: var(--cream);
    transition: border-left-color 0.2s;
  }

  .career-card:hover { border-left-color: var(--ink); }

  .career-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .career-card-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 10px;
  }

  .career-card-body {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    color: var(--charcoal);
    line-height: 1.6;
  }

  .career-card-tag {
    display: inline-block;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    background: var(--black);
    color: var(--cream);
    border-radius: 2px;
  }

  /* ─── INTERVIEW BOX ─── */
  .interview-box {
    background: var(--blue-dark);
    color: var(--cream);
    padding: 32px 36px;
    margin-bottom: 36px;
  }

  .interview-box .section-label {
    color: #8899CC;
    border-top-color: #8899CC;
    margin-bottom: 16px;
  }

  .interview-q {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    font-style: italic;
    color: var(--gold-light);
    margin-bottom: 12px;
    line-height: 1.35;
  }

  .interview-a {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    color: #d4cec5;
    line-height: 1.75;
    margin-bottom: 20px;
  }

  .interview-a strong { color: #fff; font-weight: 600; }

  .interview-attribution {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: #8899CC;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-top: 1px solid #2a3654;
    padding-top: 14px;
  }

  /* ─── TERM BOX ─── */
  .term-box {
    border: 2px solid var(--gold);
    padding: 22px 24px;
    margin-bottom: 28px;
    background: var(--cream);
  }

  .term-box-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .term-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--black);
    padding: 3px 10px;
    border-radius: 2px;
  }

  .term-word {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    font-style: italic;
    color: var(--ink);
  }

  .term-phonetic {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--light-gray);
    margin-bottom: 10px;
  }

  .term-def {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .term-example {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    color: var(--mid-gray);
    line-height: 1.6;
    border-left: 3px solid var(--gold);
    padding-left: 14px;
    font-style: italic;
  }

  /* ─── SAY THIS TODAY BOX ─── */
  .say-this-box {
    background: var(--ink);
    color: var(--cream);
    padding: 26px 30px;
    margin-bottom: 28px;
  }

  .say-this-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .say-this-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--black);
    padding: 4px 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .say-this-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: #e8e2d8;
  }

  .say-this-quote {
    font-family: 'Playfair Display', serif;
    font-size:
