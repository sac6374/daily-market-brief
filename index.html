<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brief — Daily Market Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F3EC;
    --cream-dark: #EDE7DC;
    --cream-mid: #F2EDE4;
    --black: #0A0A0A;
    --ink: #1A1A1A;
    --ink-mid: #2C2C2C;
    --ink-light: #4A4A4A;
    --rule: #C8BFB0;
    --rule-light: #DDD6CA;
    --accent-gold: #B8960C;
    --accent-red: #C0392B;
    --accent-green: #1A7A3C;
    --accent-blue: #1B3A6B;
    --ticker-bg: #0A0A0A;
    --ticker-text: #F7F3EC;
    --ticker-up: #4CAF50;
    --ticker-down: #EF5350;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Playfair Display', Georgia, serif;
    --body-serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }

  html { font-size: 16px; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--body-serif);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── TICKER STRIP ── */
  .ticker-strip {
    background: var(--ticker-bg);
    color: var(--ticker-text);
    height: 36px;
    overflow: hidden;
    position: sticky;
    top: 0;
    z-index: 999;
    display: flex;
    align-items: center;
    border-bottom: 2px solid var(--accent-gold);
  }
  .ticker-label {
    background: var(--accent-gold);
    color: var(--black);
    font-family: var(--mono);
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 0 14px;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .ticker-track-wrapper {
    overflow: hidden;
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
  }
  .ticker-track {
    display: flex;
    gap: 0;
    animation: ticker-scroll 55s linear infinite;
    white-space: nowrap;
  }
  .ticker-item {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-right: 1px solid #2a2a2a;
    height: 36px;
  }
  .ticker-item .sym { font-weight: 600; color: #E8E0D0; letter-spacing: 0.05em; }
  .ticker-item .price { color: #B8B0A0; }
  .ticker-item .chg.up { color: var(--ticker-up); }
  .ticker-item .chg.dn { color: var(--ticker-down); }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── MASTHEAD ── */
  .masthead {
    background: var(--cream);
    border-bottom: 3px solid var(--black);
    padding: 0;
  }
  .masthead-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 40px 0;
  }
  .masthead-top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .masthead-tag {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: var(--ink-light);
    text-transform: uppercase;
    padding-top: 4px;
  }
  .masthead-issue {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--ink-light);
    text-align: right;
    line-height: 1.8;
  }
  .masthead-title {
    font-family: var(--serif);
    font-size: clamp(3.2rem, 7vw, 6.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: var(--black);
    text-align: center;
    margin: 4px 0 8px;
    text-transform: uppercase;
  }
  .masthead-rule-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 0;
  }
  .masthead-rule { width: 100%; height: 1px; background: var(--black); }
  .masthead-rule.thick { height: 3px; }
  .masthead-rule.thin { height: 1px; }
  .masthead-tagline {
    font-family: var(--body-serif);
    font-size: 0.8rem;
    font-style: italic;
    color: var(--ink-light);
    text-align: center;
    padding: 6px 0 0;
    letter-spacing: 0.04em;
  }

  /* ── DATELINE ROW ── */
  .dateline-row {
    background: var(--black);
    color: var(--cream);
    max-width: 100%;
  }
  .dateline-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 38px;
  }
  .dateline-left {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: #B8B0A0;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .dateline-left span { border-right: 1px solid #333; padding-right: 20px; }
  .dateline-left span:last-child { border-right: none; padding-right: 0; }
  .dateline-center {
    font-family: var(--serif);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .dateline-right {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: #888;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── MAIN LAYOUT ── */
  .main-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 40px;
  }

  /* ── MARKET STAT GRID ── */
  .stat-grid-section { margin-bottom: 40px; }
  .section-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: var(--ink-light);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
    border: 2px solid var(--black);
  }
  .stat-card {
    padding: 16px 14px 14px;
    border-right: 1px solid var(--black);
    background: var(--cream);
    position: relative;
  }
  .stat-card:last-child { border-right: none; }
  .stat-card:nth-child(4) { border-right: 1px solid var(--black); }
  .stat-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    color: var(--ink-light);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .stat-value {
    font-family: var(--serif);
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--black);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-change {
    font-family: var(--mono);
    font-size: 0.65rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-change.up { color: var(--accent-green); }
  .stat-change.dn { color: var(--accent-red); }
  .stat-change.flat { color: var(--ink-light); }
  .stat-sub {
    font-family: var(--mono);
    font-size: 0.56rem;
    color: #888;
    margin-top: 2px;
    display: block;
  }
  .stat-card.highlight { background: var(--black); }
  .stat-card.highlight .stat-label { color: #888; }
  .stat-card.highlight .stat-value { color: var(--cream); }
  .stat-card.highlight .stat-sub { color: #666; }

  /* ── TWO-COLUMN TABLE OF CONTENTS ── */
  .toc-section { margin-bottom: 40px; }
  .toc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 2px solid var(--black);
  }
  .toc-col { padding: 0; }
  .toc-col:first-child { border-right: 1px solid var(--black); }
  .toc-col-header {
    background: var(--black);
    color: var(--cream);
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 8px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 9px 18px;
    border-bottom: 1px solid var(--rule-light);
    cursor: default;
  }
  .toc-item:last-child { border-bottom: none; }
  .toc-num {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--accent-gold);
    font-weight: 600;
    min-width: 26px;
    flex-shrink: 0;
  }
  .toc-title {
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
    line-height: 1.3;
  }
  .toc-tag {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    background: var(--cream-dark);
    color: var(--ink-light);
    padding: 2px 7px;
    text-transform: uppercase;
    border: 1px solid var(--rule);
    margin-left: 8px;
    flex-shrink: 0;
    align-self: center;
  }
  .toc-tag.hot { background: #FFF3E0; color: #E65100; border-color: #FFCC80; }
  .toc-tag.new { background: #E8F5E9; color: var(--accent-green); border-color: #A5D6A7; }

  /* ── SMART IN 30 SECONDS ── */
  .smart30-block {
    background: var(--black);
    color: var(--cream);
    padding: 28px 32px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }
  .smart30-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-gold), transparent);
  }
  .smart30-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .smart30-label::after { content: ''; flex: 1; height: 1px; background: #222; }
  .smart30-headline {
    font-family: var(--serif);
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 18px;
    line-height: 1.25;
    max-width: 760px;
  }
  .smart30-bullets {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 40px;
  }
  .smart30-bullets li {
    font-family: var(--sans);
    font-size: 0.82rem;
    color: #C8C0B0;
    line-height: 1.5;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .smart30-bullets li::before {
    content: '—';
    color: var(--accent-gold);
    font-weight: 600;
    flex-shrink: 0;
    font-family: var(--mono);
  }
  .smart30-cta {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid #222;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: #666;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .smart30-cta strong { color: var(--accent-gold); }

  /* ── ARTICLE COLUMNS ── */
  .article-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
    margin-bottom: 40px;
    align-items: start;
  }
  .article-main {}
  .article-sidebar {}

  /* ── STORY BLOCK ── */
  .story-block { margin-bottom: 36px; padding-bottom: 36px; border-bottom: 1px solid var(--rule); }
  .story-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .story-kicker {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .story-kicker.red { color: var(--accent-red); }
  .story-kicker.blue { color: var(--accent-blue); }
  .story-kicker.green { color: var(--accent-green); }
  .story-headline {
    font-family: var(--serif);
    font-size: 1.65rem;
    font-weight: 700;
    line-height: 1.2;
    color: var(--black);
    margin-bottom: 8px;
  }
  .story-headline.large { font-size: 2.1rem; }
  .story-deck {
    font-family: var(--body-serif);
    font-size: 0.95rem;
    font-style: italic;
    color: var(--ink-mid);
    margin-bottom: 12px;
    line-height: 1.5;
    border-left: 3px solid var(--rule);
    padding-left: 12px;
  }
  .story-byline {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--ink-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .story-byline .dot { width: 3px; height: 3px; background: var(--rule); border-radius: 50%; }
  .story-body {
    font-family: var(--body-serif);
    font-size: 0.9rem;
    color: var(--ink-mid);
    line-height: 1.75;
  }
  .story-body p { margin-bottom: 12px; }
  .story-body p:last-child { margin-bottom: 0; }
  .story-body strong { color: var(--ink); font-weight: 600; }
  .callout-number {
    font-family: var(--serif);
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--black);
    line-height: 1;
    margin: 16px 0 4px;
    display: block;
  }
  .callout-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    color: var(--ink-light);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  /* ── PULL QUOTE ── */
  .pull-quote {
    border-top: 2px solid var(--black);
    border-bottom: 1px solid var(--rule);
    padding: 16px 0;
    margin: 20px 0;
  }
  .pull-quote p {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-style: italic;
    font-weight: 600;
    color: var(--black);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .pull-quote cite {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--ink-light);
    text-transform: uppercase;
    font-style: normal;
  }

  /* ── SIDEBAR BOXES ── */
  .sidebar-box {
    border: 2px solid var(--black);
    margin-bottom: 24px;
    background: var(--cream);
  }
  .sidebar-box-header {
    background: var(--black);
    color: var(--cream);
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-box-header .badge {
    background: var(--accent-gold);
    color: var(--black);
    font-size: 0.55rem;
    font-weight: 700;
    padding: 2px 7px;
    letter-spacing: 0.1em;
  }
  .sidebar-box-body { padding: 14px; }
  .mini-stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--rule-light);
    font-family: var(--mono);
    font-size: 0.68rem;
  }
  .mini-stat-row:last-child { border-bottom: none; }
  .mini-stat-row .name { color: var(--ink-mid); font-weight: 600; }
  .mini-stat-row .val { color: var(--ink); }
  .mini-stat-row .chg { }
  .mini-stat-row .up { color: var(--accent-green); }
  .mini-stat-row .dn { color: var(--accent-red); }
  .mini-note {
    font-family: var(--sans);
    font-size: 0.73rem;
    color: var(--ink-mid);
    line-height: 1.55;
    padding: 4px 0;
    margin-bottom: 8px;
  }
  .mini-note:last-child { margin-bottom: 0; }
  .mini-note strong { color: var(--ink); font-weight: 600; }
  .mini-note .tag {
    font-family: var(--mono);
    font-size: 0.55rem;
    background: var(--cream-dark);
    color: var(--ink-light);
    padding: 1px 6px;
    border: 1px solid var(--rule);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    vertical-align: middle;
    margin-right: 4px;
  }

  /* ── SECTOR CARDS ── */
  .sector-section { margin-bottom: 40px; }
  .sector-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 2px solid var(--black);
  }
  .sector-card {
    padding: 18px 16px 14px;
    border-right: 1px solid var(--black);
    position: relative;
  }
  .sector-card:last-child { border-right: none; }
  .sector-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .sector-card.bull::before { background: var(--accent-green); }
  .sector-card.bear::before { background: var(--accent-red); }
  .sector-card.flat-c::before { background: var(--accent-gold); }
  .sector-name {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
    display: block;
  }
  .sector-perf {
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .sector-perf.up { color: var(--accent-green); }
  .sector-perf.dn { color: var(--accent-red); }
  .sector-perf.nt { color: var(--ink-light); }
  .sector-etf {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: #888;
    margin-bottom: 10px;
  }
  .sector-note {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--ink-mid);
    line-height: 1.45;
  }

  /* ── DARK DIVIDER ── */
  .dark-divider {
    background: var(--black);
    color: var(--cream);
    padding: 18px 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .dark-divider-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-gold);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .dark-divider-rule { flex: 1; height: 1px; background: #333; }
  .dark-divider-note {
    font-family: var(--sans);
    font-size: 0.75rem;
    color: #888;
    white-space: nowrap;
  }

  /* ── FINANCE CAREER CARDS ── */
  .career-section
