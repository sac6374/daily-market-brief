<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brief — Daily Market Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE7D9;
    --cream-border: #D4C9B0;
    --black: #0A0A0A;
    --ink: #1A1A1A;
    --ink-mid: #2C2C2C;
    --ink-light: #4A4A4A;
    --ink-faint: #7A7A7A;
    --red: #C0392B;
    --green: #1A6B3C;
    --gold: #B8860B;
    --gold-light: #F0E06A;
    --blue-dark: #1B2A4A;
    --blue-mid: #2C4A7C;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Playfair Display', Georgia, serif;
    --serif-body: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html { font-size: 16px; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: var(--serif-body);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── TICKER STRIP ─── */
  .ticker-strip {
    background: var(--black);
    color: #E8E0CC;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 7px 0;
    overflow: hidden;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid #B8860B;
  }
  .ticker-inner {
    display: inline-block;
    animation: tickerScroll 55s linear infinite;
    padding-left: 100%;
  }
  .ticker-inner:hover { animation-play-state: paused; }
  @keyframes tickerScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
  .ticker-item { display: inline-block; margin: 0 2.5rem; }
  .ticker-item .sym { color: #F5F0E8; font-weight: 600; }
  .ticker-item .val { color: #E8E0CC; margin: 0 0.35rem; }
  .up { color: #4CAF82 !important; }
  .dn { color: #E57373 !important; }
  .flat { color: #B0A88A !important; }

  /* ─── MASTHEAD ─── */
  .masthead {
    background: var(--black);
    padding: 0;
    border-bottom: 3px solid var(--black);
  }
  .masthead-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 32px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }
  .masthead-left { flex: 1; }
  .masthead-pub-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    color: #B8860B;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .masthead-title {
    font-family: var(--serif);
    font-size: clamp(2.8rem, 5vw, 4.2rem);
    font-weight: 900;
    color: #F5F0E8;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .masthead-title span { color: var(--gold-light); }
  .masthead-tagline {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 0.88rem;
    color: #8A8070;
    margin-top: 7px;
    letter-spacing: 0.01em;
  }
  .masthead-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .masthead-edition {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: #8A8070;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .masthead-date {
    font-family: var(--serif);
    font-size: 1.05rem;
    color: #F5F0E8;
    font-weight: 600;
  }
  .masthead-issue {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: #5A5040;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ─── DATELINE ROW ─── */
  .dateline-row {
    background: var(--cream-dark);
    border-bottom: 1.5px solid var(--cream-border);
    border-top: 1.5px solid var(--cream-border);
    padding: 9px 32px;
  }
  .dateline-inner {
    max-width: 1180px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .dateline-item {
    font-family: var(--mono);
    font-size: 0.66rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .dateline-item strong { color: var(--ink); font-weight: 600; }
  .dateline-sep {
    color: var(--cream-border);
    font-size: 1.1rem;
    line-height: 1;
  }
  .market-status-open {
    background: #1A6B3C;
    color: #fff;
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    padding: 2px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .market-status-closed {
    background: #C0392B;
    color: #fff;
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    padding: 2px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ─── MAIN WRAPPER ─── */
  .main-wrapper {
    max-width: 1180px;
    margin: 0 auto;
    padding: 36px 32px 60px;
  }

  /* ─── MARKET STAT GRID ─── */
  .market-stat-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
    border: 1.5px solid var(--cream-border);
    margin-bottom: 40px;
    background: var(--cream-dark);
    overflow: hidden;
  }
  .stat-card {
    padding: 16px 18px;
    border-right: 1.5px solid var(--cream-border);
    position: relative;
  }
  .stat-card:last-child { border-right: none; }
  .stat-card-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .stat-card-value {
    font-family: var(--mono);
    font-size: 1.18rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .stat-card-change {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
  }
  .stat-card-change.up { color: var(--green); }
  .stat-card-change.dn { color: var(--red); }
  .stat-card-change.flat { color: var(--ink-faint); }
  .stat-card-sub {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--ink-faint);
    margin-top: 3px;
  }
  .stat-card.highlight {
    background: var(--black);
  }
  .stat-card.highlight .stat-card-label { color: #6A6050; }
  .stat-card.highlight .stat-card-value { color: #F5F0E8; }
  .stat-card.highlight .stat-card-sub { color: #5A5040; }

  /* ─── TWO-COLUMN TABLE OF CONTENTS ─── */
  .toc-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1.5px solid var(--cream-border);
    margin-bottom: 40px;
    overflow: hidden;
  }
  .toc-header {
    grid-column: 1 / -1;
    background: var(--ink);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .toc-header-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-light);
    font-weight: 600;
  }
  .toc-header-rule {
    flex: 1;
    height: 1px;
    background: #2A2A2A;
  }
  .toc-col { padding: 16px 20px; }
  .toc-col:first-of-type {
    border-right: 1.5px solid var(--cream-border);
  }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 6px 0;
    border-bottom: 1px dotted var(--cream-border);
  }
  .toc-item:last-child { border-bottom: none; }
  .toc-num {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--ink-faint);
    min-width: 22px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .toc-text {
    font-family: var(--serif-body);
    font-size: 0.85rem;
    color: var(--ink-mid);
    line-height: 1.3;
    flex: 1;
  }
  .toc-tag {
    font-family: var(--mono);
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .tag-macro { background: #E8E0CC; color: var(--ink-light); }
  .tag-equity { background: #D4E8D4; color: #1A4A2A; }
  .tag-rates { background: #D4DCE8; color: #1A2A4A; }
  .tag-fx { background: #E8D4D4; color: #4A1A1A; }
  .tag-career { background: #E8E8D4; color: #3A3A1A; }
  .tag-learn { background: #D4E4E8; color: #1A3A3A; }
  .tag-commodity { background: #E8DCD4; color: #4A2A1A; }

  /* ─── SMART IN 30 SECONDS ─── */
  .smart-block {
    background: var(--blue-dark);
    border: 1.5px solid #2A3A5A;
    margin-bottom: 40px;
    overflow: hidden;
  }
  .smart-header {
    background: var(--black);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    border-bottom: 1.5px solid #1A2A3A;
  }
  .smart-icon {
    width: 32px;
    height: 32px;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .smart-header-text { flex: 1; }
  .smart-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 2px;
  }
  .smart-title {
    font-family: var(--serif);
    font-size: 1.02rem;
    font-weight: 700;
    color: #F5F0E8;
    line-height: 1.2;
  }
  .smart-body { padding: 24px; }
  .smart-lead {
    font-family: var(--serif-body);
    font-size: 1.0rem;
    font-style: italic;
    color: #C8C0A8;
    line-height: 1.6;
    margin-bottom: 20px;
    border-left: 3px solid var(--gold);
    padding-left: 16px;
  }
  .smart-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .smart-points li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-family: var(--serif-body);
    font-size: 0.88rem;
    color: #A8A090;
    line-height: 1.55;
  }
  .smart-points li::before {
    content: '▸';
    color: var(--gold);
    font-size: 0.7rem;
    margin-top: 3px;
    flex-shrink: 0;
  }
  .smart-points li strong { color: #E8E0CC; font-weight: 600; }

  /* ─── SECTION HEADERS ─── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 20px;
    margin-top: 40px;
  }
  .section-header:first-of-type { margin-top: 0; }
  .section-num {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    min-width: 28px;
  }
  .section-title {
    font-family: var(--serif);
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .section-rule {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(to right, var(--cream-border), transparent);
  }
  .section-tag {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border: 1px solid var(--cream-border);
    padding: 2px 8px;
    border-radius: 2px;
  }

  /* ─── MAIN CONTENT GRID ─── */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 32px;
    margin-bottom: 40px;
  }

  /* ─── BOXED SECTIONS ─── */
  .boxed {
    border: 1.5px solid var(--cream-border);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .boxed-header {
    background: var(--cream-dark);
    border-bottom: 1.5px solid var(--cream-border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .boxed-header-title {
    font-family: var(--mono);
    font-size: 0.64rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mid);
    font-weight: 600;
  }
  .boxed-header-meta {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
  }
  .boxed-body { padding: 20px 18px; }

  /* ─── LEAD ARTICLE ─── */
  .lead-article { margin-bottom: 32px; }
  .lead-eyebrow {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .lead-headline {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 2.8vw, 2.2rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .lead-subhead {
    font-family: var(--serif-body);
    font-size: 1.02rem;
    font-style: italic;
    color: var(--ink-light);
    line-height: 1.55;
    margin-bottom: 16px;
    border-left: 3px solid var(--cream-border);
    padding-left: 14px;
  }
  .lead-body {
    font-family: var(--serif-body);
    font-size: 0.92rem;
    color: var(--ink-mid);
    line-height: 1.72;
  }
  .lead-body p { margin-bottom: 14px; }
  .lead-body p:last-child { margin-bottom: 0; }
  .article-divider {
    border: none;
    border-top: 1px solid var(--cream-border);
    margin: 28px 0;
  }

  /* ─── SECONDARY ARTICLE ─── */
  .secondary-article { margin-bottom: 28px; }
  .sec-headline {
    font-family: var(--serif);
    font-size: 1.18rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .sec-body {
    font-family: var(--serif-body);
    font-size: 0.87rem;
    color: var(--ink-mid);
    line-height: 1.68;
  }

  /* ─── DATA TABLE ─── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.75rem;
  }
  .data-table thead tr {
    background: var(--ink);
  }
  .data-table thead th {
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #B8B0A0;
    white-space: nowrap;
  }
  .data-table thead th:not(:first-child) { text-align: right; }
  .data-table tbody tr {
    border-bottom: 1px solid var(--cream-border);
    transition: background 0.15s;
  }
  .data-table tbody tr:hover { background: var(--cream-dark); }
  .data-table tbody td {
    padding: 9px 12px;
    color: var(--ink-mid);
  }
  .data-table tbody td:not(:first-child) { text-align: right; }
  .data-table .sym-col { color: var(--ink); font-weight: 600; }
  .data-table .up-val { color: var(--green); font-weight: 500; }
  .data-table .dn-val { color: var(--red); font-weight: 500; }
  .data-table .flat-val { color: var(--ink-faint); }

  /* ─── SIDEBAR ─── */
  .sidebar { display: flex; flex-direction: column; gap: 0; }

  /* ─── MARKET SECTOR CARDS ─── */
  .sector-cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1.5px solid var(--cream-border);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .sector-card-header {
    grid-column: 1 / -1;
    background: var(--ink);
    padding: 9px 16px;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .sector-card-header-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #B8B0A0;
    font-weight: 600;
  }
  .sector-card {
    padding: 14px 16px;
    border-right: 1px solid var(--cream-border);
    border-bottom: 1px solid var(--cream-border);
  }
  .sector-card:nth-child(even) { border-right: none; }
  .sector-card:nth-last-child(-n+2) { border-bottom: none; }
  .sector-name {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 5px;
  }
  .sector-val {
    font-family: var(--mono);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.1;
  }
  .sector-chg {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
  }
  .sector-chg.up { color: var(--green); }
  .sector-chg.dn { color: var(--red); }
  .sector-bar {
    height: 3px;
    background: var(--cream-border);
    margin-top: 8px;
    border-radius: 2px;
    overflow: hidden;
  }
  .sector-bar-fill {
    height: 100%;
    border-radius: 2px;
  }
  .sector-bar-fill.up { background: var(--green); }
  .sector-bar-fill.dn { background: var(--red); }

  /* ─── CAREER CARDS ─── */
  .career-cards { margin-bottom: 28px; }
  .career-card {
    border: 1.5px solid var(--cream-border);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .career-card:last-child { margin-bottom: 0; }
  .career-card-top {
    background: var(--cream-dark);
    padding: 10px 16px;
    border-bottom: 1.5px solid var(--cream-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .career-card-role {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mid);
    font-weight: 600;
  }
